spring.application.name=Campus Equipment Loan App

# MySQL datasource (XAMPP default port 3306)
spring.datasource.url=jdbc:mysql://127.0.0.1:3306/loandb?useSSL=false&allowPublicKeyRetrieval=true&serverTimezone=UTC
spring.datasource.username=root
spring.datasource.password=
spring.datasource.driver-class-name=com.mysql.cj.jdbc.Driver

# Hibernate JPA
spring.jpa.hibernate.ddl-auto=none
spring.jpa.show-sql=true
spring.jpa.properties.hibernate.format_sql=true
spring.jpa.database-platform=org.hibernate.dialect.MySQLDialect

# Enable error messages
server.error.include-message=always
